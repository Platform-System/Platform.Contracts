syntax = "proto3";

package catalogintegration;

import "Common/common.proto";

option csharp_namespace = "Platform.Catalog.Grpc";

// Catalog sở hữu dữ liệu product, stock và quyền upload cover.
// Service khác gọi qua gRPC contract này thay vì truy cập trực tiếp CatalogDb.
service CatalogIntegration {
  rpc GetProductCartSnapshot (GetProductCartSnapshotRequest) returns (GetProductCartSnapshotResponse);
  rpc DecreaseStock (AdjustStockRequest) returns (AdjustStockResponse);
  rpc RestoreStock (AdjustStockRequest) returns (AdjustStockResponse);
  rpc AuthorizeProductCoverUpload (AuthorizeProductCoverUploadRequest) returns (AuthorizeProductCoverUploadResponse);
  rpc SetProductCover (SetProductCoverRequest) returns (SetProductCoverResponse);
}

message GetProductCartSnapshotRequest {
  string product_id = 1;
}

enum ProductKindGrpc {
  PRODUCT_KIND_GRPC_UNSPECIFIED = 0;
  PRODUCT_KIND_GRPC_DIGITAL = 1;
  PRODUCT_KIND_GRPC_PHYSICAL = 2;
}

message GetProductCartSnapshotResponse {
  common.ResponseStatus status = 1;
  ProductCartSnapshotData data = 2;
}

message ProductCartSnapshotData {
  string id = 1;
  string title = 2;
  int64 price = 3;
  ProductKindGrpc kind = 4;
  bool is_active = 5;
  bool has_stock = 6;
  int32 stock = 7;
}

message StockAdjustmentItem {
  string product_id = 1;
  int32 quantity = 2;
}

message AdjustStockRequest {
  repeated StockAdjustmentItem items = 1;
}

message AdjustStockResponse {
  common.ResponseStatus status = 1;
}

message AuthorizeProductCoverUploadRequest {
  string product_id = 1;
  string user_id = 2;
  repeated string roles = 3;
}

enum ProductCoverUploadVisibility {
  PRODUCT_COVER_UPLOAD_VISIBILITY_UNSPECIFIED = 0;
  PRODUCT_COVER_UPLOAD_VISIBILITY_PRIVATE = 1;
  PRODUCT_COVER_UPLOAD_VISIBILITY_PUBLIC = 2;
}

message AuthorizeProductCoverUploadResponse {
  common.ResponseStatus status = 1;
  ProductCoverUploadAuthorizationData data = 2;
}

message ProductCoverUploadAuthorizationData {
  ProductCoverUploadVisibility visibility = 1;
}

message SetProductCoverRequest {
  string product_id = 1;
  string user_id = 2;
  string blob_name = 3;
  string container_name = 4;
  string file_name = 5;
  string content_type = 6;
  int64 size = 7;
  string alt_text = 8;
}

message SetProductCoverResponse {
  common.ResponseStatus status = 1;
}
